[acp]
enabled = true

[acp.zed]
enabled = true

[agent]
api_key_env = "GEMINI_API_KEY"
default_model = "gemini-3.1-flash-lite-preview"
provider = "gemini"
reasoning_effort = "low"

[agent.persistent_memory]
enabled = true

[automation.full_auto]
allowed_tools = [
    "write_file",
    "read_file",
    "list_files",
    "grep_file",
]
profile_path = "automation/full_auto_profile.toml"

[commands]
allow_glob = [
    "git *",
    "cargo *",
    "python -m *",
]
allow_list = [
    "ls",
    "pwd",
    "git status",
    "git diff",
    "cargo check",
    "echo",
]
allow_regex = []
deny_glob = [
    "rm *",
    "sudo *",
    "chmod *",
    "chown *",
    "kubectl *",
]
deny_list = [
    "rm -rf /",
    "rm -rf ~",
    "shutdown",
    "reboot",
    "sudo *",
    ":(){ :|:& };:",
]
deny_regex = []

[context]
preserve_recent_turns = 6

[features]
memories = true

[mcp]
enabled = true

[[mcp.providers]]
args = ["mcp-server-time"]
command = "uvx"
enabled = true
max_concurrent_requests = 3
name = "time"

[mcp.providers.env]

[mcp.ui.renderers]
context7 = "context7"
sequential-thinking = "sequential-thinking"

[permissions]
default_mode = "auto"

[security]
encrypt_payloads = false
zero_trust_mode = false

[syntax_highlighting]
enabled_languages = [
    "rust",
    "python",
    "javascript",
    "typescript",
    "go",
    "java",
    "bash",
    "sh",
    "shell",
    "zsh",
    "markdown",
    "md",
]
highlight_timeout_ms = 1000

[telemetry]
bottleneck_tracing = false

[tools]
max_consecutive_blocked_tool_calls_per_turn = 8

[tools.policies]
request_user_input = "allow"
task_tracker = "prompt"
unified_file = "allow"

[ui.status_line]
refresh_interval_ms = 2000

[ui.terminal_title]
items = [
    "spinner",
    "project",
]
