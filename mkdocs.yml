site_name: NexusAgent
site_description: Multi-agent orchestration framework with NATS messaging
site_author: Steven Page
repo_url: https://github.com/stevenpage/nexusagent
repo_name: nexusagent

theme:
  name: material
  palette:
    - scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.expand
    - navigation.top
    - search.suggest
    - search.highlight
    - content.tabs.link
    - content.code.annotation
    - content.code.copy

plugins:
  - search

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.tabbed:
      alternate_style: true
  - tables
  - toc:
      permalink: true

nav:
  - Home: index.md
  - Getting Started:
    - Installation: installation.md
    - Quick Start: quickstart.md
    - Configuration: configuration.md
    - Getting Started Guide: getting_started.md
    - Local Development: local_development.md
    - Environment & Execution: env_execution_guide.md
  - Architecture:
    - Overview: architecture/overview.md
    - Tool System: architecture/tools.md
    - Policy System: architecture/policies.md
    - Multi-Agent: architecture/multi-agent.md
  - Codebase:
    - Codebase Map: CODEBASE_MAP.md
  - ADRs:
    - Index: adrs/index.md
    - Telemetry System: adrs/0001-telemetry-system-design.md
    - Project Structure: adrs/0002-project-structure-build-modes.md
    - Branding & Config: adrs/0003-project-branding-config.md
    - Documentation Standards: adrs/0004-documentation-standards.md
  - Plans:
    - Assessment & Roadmap: plans/2026-07-12-assessment-and-roadmap.md
    - TUI Parity Sprint: plans/2026-06-11-tui-parity-sprint.md
  - Research:
    - Tool Parity: research/TOOL-PARITY-FINAL.md
    - TUI Aesthetics: research/TUI-AESTHETICS-FINAL.md
  - Reports:
    - Implementation Plan: implementation-plan-2026-07-09.md
    - Audit Archive: archive/README.md
  - Contributing: CONTRIBUTING.md

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/stevenpage/nexusagent
  version:
    provider: mike
