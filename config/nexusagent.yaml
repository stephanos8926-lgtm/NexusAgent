server:
  nats_url: "nats://localhost:4222"
  db_path: "data/nexus.db"
  api_port: 8000

client:
  tui_theme: "textual-dark"
  timeout: 30
  retry_limit: 3

agent:
  default_model: "gemini-2.5-flash"
  primary_provider: "gemini"
  max_tool_output_chars: 400
  max_conversation_history: 40
  compaction_enabled: true
  # Memory extraction
  memory_model: ""
  # Git-backed memory
  memory_git_enabled: true
  memory_git_auto_commit: true
  # Two-tier compaction
  compaction_tier2_threshold: 0.75
  compaction_tier2_fresh_tail: 32

prompt:
  base_prompt_file: "NEXUS.md"
  load_cwd_prompt: true
  max_chain_depth: 8
  max_inject_file_size: 262144
  chat_file_injection: true
  session_history_count: 5
  session_summary_max_chars: 2000

logging:
  level: "INFO"

budget:
  daily_budget_usd: 10.0
  monthly_budget_usd: 100.0
  alert_thresholds:
    - 0.5
    - 0.8
    - 0.95
  quota_cooldown_seconds: 3600
  enabled: true

test_mode:
  block_real_api: true
