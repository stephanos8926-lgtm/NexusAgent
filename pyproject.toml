[project]
name = "nexusagent"
version = "0.1.0"
description = "Add your description here"
readme = "README.md"
requires-python = ">=3.14"
dependencies = [
    "langgraph",
    "langgraph-checkpoint",
    "deepagents",
    "nats-py",
    "pyyaml",
    "patch-ng",
]

[build-system]
requires = ["setuptools"]
build-backend = "setuptools.build_meta"

[tool.setuptools.packages.find]
where = ["src"]

[project.scripts]
nexus-server = "nexusagent.server:run_server"
nexus-client = "nexusagent.cli:main"
