// ── Score Ring ──
function ScoreRing({ score, max, size = 80, color = '#5E6AD2', label }) {
  const radius = (size - 8) / 2;
  const circumference = 2 * Math.PI * radius;
  const progress = (score / max) * circumference;
  const offset = circumference - progress;

  return (
    <div className="flex flex-col items-center gap-1">
      <svg width={size} height={size} className="score-ring">
        <circle cx={size/2} cy={size/2} r={radius} fill="none" stroke="currentColor" strokeWidth="4" className="text-surface-200 dark:text-surface-700" />
        <circle cx={size/2} cy={size/2} r={radius} fill="none" stroke={color} strokeWidth="4"
          strokeDasharray={circumference} strokeDashoffset={offset} strokeLinecap="round"
          style={{ transition: 'stroke-dashoffset 1s ease-in-out' }} />
        <text x={size/2} y={size/2} textAnchor="middle" dy="0.35em" className="text-sm font-semibold fill-current">
          {score}
        </text>
      </svg>
      {label && <span className="text-xs text-surface-500">{label}</span>}
    </div>
  );
}

// ── Chart Hook ──
function useChartRef(type, data, options) {
  const canvasRef = useRef(null);
  const chartRef = useRef(null);

  useEffect(() => {
    if (!canvasRef.current) return;
    if (chartRef.current) chartRef.current.destroy();
    
    const ctx = canvasRef.current.getContext('2d');
    chartRef.current = new Chart(ctx, { type, data, options });
    
    return () => { if (chartRef.current) chartRef.current.destroy(); };
  }, [type, JSON.stringify(data), JSON.stringify(options)]);

  return canvasRef;
}

// ── Mermaid Diagram ──
function MermaidDiagram({ chart, id }) {
  const ref = useRef(null);
  
  useEffect(() => {
    if (!ref.current) return;
    mermaid.initialize({ startOnLoad: false, theme: 'base', themeVariables: { primaryColor: '#5E6AD2', primaryTextColor: '#fff', primaryBorderColor: '#5E6AD2', lineColor: '#a1a1aa', secondaryColor: '#3b82f6', tertiaryColor: '#22c55e' } });
    mermaid.render(id, chart).then(({ svg }) => {
      if (ref.current) ref.current.innerHTML = svg;
    });
  }, [chart, id]);

  return <div ref={ref} className="mermaid-container overflow-auto" />;
}

                  backgroundColor: AUDIT_DATA.lintViolations.map(l => l.severity === 'high' ? '#ef4444' : l.severity === 'medium' ? '#f59e0b' : '#3b82f6'),
                  borderRadius: 4,
                  borderSkipped: false,
                }]
              }, {
                responsive: true,
                maintainAspectRatio: false,
                indexAxis: 'y',
                scales: { x: { beginAtZero: true, ticks: { color: '#a1a1aa' }, grid: { color: '#e4e4e7' } }, y: { ticks: { color: '#52525b', font: { size: 10 } }, grid: { display: false } } },
                plugins: { legend: { display: false } }
              })} className="w-full h-full" /></div>
            </div>
          </div>
        )}

        {/* ═══ COMPETITORS ═══ */}
        {activeTab === 'competitor' && (
          <div className="fade-in space-y-6">
            <div className="glass rounded-2xl p-6">
              <h3 className="text-sm font-semibold mb-3">Feature Comparison Matrix</h3>
              <div className="overflow-x-auto">
                <table className="w-full text-xs">
                  <thead>
                    <tr className="border-b border-surface-200 dark:border-surface-700">
                      <th className="text-left py-2 px-3 font-medium sticky left-0 bg-inherit">Feature</th>
                      <th className="py-2 px-2 font-medium text-primary-500">NexusAgent</th>
                      <th className="py-2 px-2 font-medium">Claude Code</th>
                      <th className="py-2 px-2 font-medium">Gemini CLI</th>
                      <th className="py-2 px-2 font-medium">Codex</th>
                      <th className="py-2 px-2 font-medium">Windsurf</th>
                      <th className="py-2 px-2 font-medium">Cursor</th>
                      <th className="py-2 px-2 font-medium">Aider</th>
                      <th className="py-2 px-2 font-medium">Continue</th>
                      <th className="py-2 px-2 font-medium">SWE-agent</th>
                    </tr>
                  </thead>
                  <tbody>
                    {AUDIT_DATA.competitorMatrix.map(row => <CompetitorRow key={row.feature} {...row} />)}
                  </tbody>
                </table>
              </div>
            </div>
            <div className="grid lg:grid-cols-2 gap-6">
              <div className="glass rounded-2xl p-6">
                <h3 className="text-sm font-semibold mb-3">NexusAgent Strengths</h3>
                <ul className="space-y-2">
                  {['Multi-interface by design (TUI + CLI + WebSocket + SDK + Web UI)', 'Policy-aware multi-agent system (permissive/restricted/strict)', 'Hybrid memory architecture (file + vector index)', 'NATS-backed task bus with circuit breakers', 'Deep Research orchestrator (intent→plan→refine→execute→synthesize)', 'Open source & model-agnostic'].map((s, i) => (
                    <li key={i} className="flex items-start gap-2 text-sm"><span className="text-success mt-0.5">✓</span>{s}</li>
                  ))}
                </ul>
              </div>
              <div className="glass rounded-2xl p-6">
                <h3 className="text-sm font-semibold mb-3">Critical Gaps</h3>
                <ul className="space-y-2">
                  {['No MCP support — the #1 ecosystem gap in 2026', 'No codebase indexing/RAG — agent is "blind" vs competitors', 'No sandboxing — security risk', 'No IDE extension — limits reach to terminal-only users', 'No built-in model — requires external API key', 'No auto-commit/Git workflow automation'].map((s, i) => (
                    <li key={i} className="flex items-start gap-2 text-sm"><span className="text-danger mt-0.5">✗</span>{s}</li>
                  ))}
                </ul>
              </div>
            </div>
          </div>
        )}

        {/* ═══ ROADMAP ═══ */}
        {activeTab === 'roadmap' && (
          <div className="fade-in space-y-4">
            <div className="glass rounded-2xl p-6 mb-6">
              <h2 className="text-lg font-semibold mb-2">Improvement Roadmap</h2>
              <p className="text-sm text-surface-500">5 phases, 37 tasks. Click each phase to expand.</p>
            </div>
            {AUDIT_DATA.roadmap.map((phase, i) => (
              <RoadmapPhase key={i} phase={phase} index={i} />
            ))}
          </div>
        )}

        {/* ═══ GROWTH ═══ */}
        {activeTab === 'growth' && (
          <div className="fade-in space-y-6">
            <div className="grid lg:grid-cols-2 gap-6">
              <div className="glass rounded-2xl p-6">
                <h3 className="text-sm font-semibold mb-3">Issue Trend (Sprints)</h3>
                <div className="h-64"><VelocityLineChart /></div>
              </div>
              <div className="glass rounded-2xl p-6">
                <h3 className="text-sm font-semibold mb-3">Test Coverage</h3>
                <div className="h-64 flex items-center justify-center">
                  <div className="relative">
                    <TestCoverageChart />
                    <div className="absolute inset-0 flex items-center justify-center">
                      <span className="text-2xl font-bold">55%</span>
                    </div>
                  </div>
                </div>
              </div>
            </div>
            <div className="glass rounded-2xl p-6">
              <h3 className="text-sm font-semibold mb-3">Velocity Metrics</h3>
              <div className="overflow-x-auto">
                <table className="w-full text-sm">
                  <thead>
                    <tr className="border-b border-surface-200 dark:border-surface-700">
                      <th className="text-left py-2 px-3 font-medium">Metric</th>
                      <th className="text-right py-2 px-3 font-medium">Current</th>
                      <th className="text-right py-2 px-3 font-medium">Last Sprint</th>
                      <th className="text-right py-2 px-3 font-medium">Delta</th>
                      <th className="text-right py-2 px-3 font-medium">Target</th>
                    </tr>
                  </thead>
                  <tbody>
                    {AUDIT_DATA.velocityMetrics.map(m => (
                      <tr key={m.metric} className="border-b border-surface-200/50 dark:border-surface-700/50">
                        <td className="py-2 px-3 font-medium">{m.metric}</td>
                        <td className="py-2 px-3 text-right">{m.current}{m.metric.includes('%') ? '%' : ''}</td>
                        <td className="py-2 px-3 text-right text-surface-400">{m.lastSprint}{m.metric.includes('%') ? '%' : ''}</td>
                        <td className={`py-2 px-3 text-right font-medium ${m.delta > 0 && !m.metric.includes('issues') && !m.metric.includes('Issues') ? 'text-success' : m.delta < 0 ? 'text-success' : 'text-surface-400'}`}>
                          {m.delta > 0 ? '+' : ''}{m.delta}{m.metric.includes('%') ? '%' : ''}
                        </td>
                        <td className="py-2 px-3 text-right text-primary-500">{m.target || '—'}</td>
                      </tr>
                    ))}
                  </tbody>
                </table>
              </div>
            </div>
            <div className="glass rounded-2xl p-6">
              <h3 className="text-sm font-semibold mb-3">Full Capability Matrix</h3>
              <div className="overflow-x-auto">
                <table className="w-full text-sm">
                  <thead>
                    <tr className="border-b border-surface-200 dark:border-surface-700">
                      <th className="text-left py-2 px-3 font-medium">Capability</th>
                      <th className="text-center py-2 px-3 font-medium">Have</th>
                      <th className="text-center py-2 px-3 font-medium">Target</th>
                      <th className="text-center py-2 px-3 font-medium">Gap</th>
                      <th className="text-center py-2 px-3 font-medium">Priority</th>
                    </tr>
                  </thead>
                  <tbody>
                    {AUDIT_DATA.capabilityMatrix.map(c => (
                      <tr key={c.capability} className={`border-b border-surface-200/50 dark:border-surface-700/50 ${c.gap ? 'bg-red-50/50 dark:bg-red-900/10' : ''}`}>
                        <td className="py-2 px-3 font-medium">{c.capability}</td>
                        <td className="py-2 px-3 text-center">{c.have ? '✅' : '❌'}</td>
                        <td className="py-2 px-3 text-center">{c.target ? '✅' : '❌'}</td>
                        <td className="py-2 px-3 text-center">{c.gap ? '🔴' : '—'}</td>
                        <td className="py-2 px-3 text-center">{c.priority || '—'}</td>
                      </tr>
                    ))}
                  </tbody>
                </table>
              </div>
            </div>
          </div>
        )}

      </main>

      {/* Footer */}
      <footer className="max-w-7xl mx-auto px-4 py-8 text-center">
        <p className="text-xs text-surface-400">
          NexusAgent Audit Dashboard · Generated {AUDIT_DATA.meta.date} · 
          <a href="https://github.com/stephanos8926-lgtm/NexusAgent" className="text-primary-500 hover:underline ml-1">GitHub</a>
        </p>
      </footer>
    </div>
  );
}

// Mount
const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<App />);
</script>
</body>
</html>
