const charts = [];

function createChart(canvasId, type, data, options) {
  const canvas = document.getElementById(canvasId);
  if (!canvas) return;
  const ctx = canvas.getContext('2d');
  charts.push(new Chart(ctx, { type, data, options }));
}

function destroyCharts() {
  charts.forEach(c => c.destroy());
  charts.length = 0;
}

function initRadarChart() {

    labels: AUDIT_DATA.scores.map(s => s.name),

      backgroundColor: 'rgba(94, 106, 210, 0.15)',
      borderColor: '#5E6AD2', borderWidth: 2,
      pointBackgroundColor: '#5E6AD2', pointBorderColor: '#fff', pointBorderWidth: 2, pointRadius: 4,

      label: 'Target',
      data: AUDIT_DATA.scores.map(() => 9),

function renderScoreRing(score, max, color, label, size = 80) {
  const radius = (size - 8) / 2;
  const circumference = 2 * Math.PI * radius;
  const progress = (score / max) * circumference;
  const offset = circumference - progress;
  return `<div class="flex flex-col items-center gap-1">
    <svg width="${size}" height="${size}" class="score-ring">
      <circle cx="${size/2}" cy="${size/2}" r="${radius}" fill="none" stroke="currentColor" stroke-width="4" class="text-surface-200 dark:text-surface-700"/>
      <circle cx="${size/2}" cy="${size/2}" r="${radius}" fill="none" stroke="${color}" stroke-width="4" stroke-dasharray="${circumference}" stroke-dashoffset="${offset}" stroke-linecap="round" style="transition: stroke-dashoffset 1s ease-in-out"/>
      <text x="${size/2}" y="${size/2}" text-anchor="middle" dy="0.35em" class="text-sm font-semibold fill-current">${score}</text>
    </svg>
    <span class="text-xs text-surface-500">${label}</span>
  </div>`;
}

function renderIssueRow(issue) {
  const colors = { critical: 'issue-critical bg-red-50 dark:bg-red-900/20', high: 'issue-high bg-orange-50 dark:bg-orange-900/20', medium: 'issue-medium bg-yellow-50 dark:bg-yellow-900/20', low: 'issue-low bg-blue-50 dark:bg-blue-900/20' };
  const badges = { critical: 'bg-danger text-white', high: 'bg-orange-500 text-white', medium: 'bg-warning text-white', low: 'bg-info text-white' };
  return `<div class="p-3 rounded-lg mb-2 ${colors[issue.severity]} fade-in">
    <div class="flex items-start gap-3">
      <span class="text-xs font-bold px-2 py-0.5 rounded ${badges[issue.severity]}">#${issue.id}</span>
      <div class="flex-1 min-w-0">
        <p class="text-sm font-medium">${issue.issue}</p>
        <div class="flex items-center gap-2 mt-1 flex-wrap">
          ${issue.file ? `<code class="text-xs bg-surface-200/50 dark:bg-surface-700/50 px-1.5 py-0.5 rounded">${issue.file}</code>` : ''}
          ${issue.source ? `<span class="text-xs text-surface-400">${issue.source}</span>` : ''}
          ${issue.impact ? `<span class="text-xs text-surface-500">→ ${issue.impact}</span>` : ''}
          ${issue.effort ? `<span class="text-xs bg-surface-200 dark:bg-surface-700 px-1.5 py-0.5 rounded">${issue.effort}</span>` : ''}
        </div>
      </div>
    </div>
  </div>`;
}

function renderRoadmapPhase(phase, index) {
  const doneCount = phase.items.filter(i => i.done).length;
  const totalCount = phase.items.length;
  const pct = totalCount > 0 ? Math.round((doneCount / totalCount) * 100) : 0;
  const itemsHtml = phase.items.map(item =>
    `<label class="flex items-center gap-3 py-2 cursor-pointer hover:bg-surface-100/30 dark:hover:bg-surface-800/30 px-2 rounded">
      <input type="checkbox" ${item.done ? 'checked' : ''} readonly class="w-4 h-4 rounded border-surface-300 text-primary-500 focus:ring-primary-500"/>
      <span class="text-sm ${item.done ? 'line-through text-surface-400' : ''}">${item.task}</span>
    </label>`
  ).join('');
  return `<div class="glass rounded-xl overflow-hidden mb-3 fade-in">
    <button onclick="togglePhase(${index})" class="w-full p-4 flex items-center gap-3 text-left hover:bg-surface-100/50 dark:hover:bg-surface-800/50 transition-colors">
      <div class="w-8 h-8 rounded-lg flex items-center justify-center text-white text-sm font-bold" style="background-color: ${phase.color}">${index + 1}</div>
      <div class="flex-1">
        <p class="text-sm font-semibold">${phase.phase}</p>
        <p class="text-xs text-surface-400">${phase.weeks} · ${doneCount}/${totalCount} done</p>
      </div>
      <div class="flex items-center gap-2">
        <div class="w-20 h-2 bg-surface-200 dark:bg-surface-700 rounded-full overflow-hidden">
          <div class="h-full rounded-full transition-all" style="width: ${pct}%; background-color: ${phase.color}"></div>
        </div>
        <span class="text-xs text-surface-400 w-8 text-right">${pct}%</span>
        <span class="text-surface-400" id="phase-arrow-${index}">▸</span>
      </div>
    </button>
    <div id="phase-items-${index}" class="hidden px-4 pb-4 border-t border-surface-200/50 dark:border-surface-700/50">${itemsHtml}</div>
  </div>`;
}

function togglePhase(index) {
  const el = document.getElementById(`phase-items-${index}`);
  const arrow = document.getElementById(`phase-arrow-${index}`);
  if (el.classList.contains('hidden')) {
    el.classList.remove('hidden');
    arrow.textContent = '▾';
  } else {
    el.classList.add('hidden');
    arrow.textContent = '▸';
  }
}

function renderIssues() {

  return `<div class="fade-in space-y-4">
    <div class="flex items-center gap-2 flex-wrap">

        const count = f === 'all' ? all.length : (AUDIT_DATA.issues[f]?.length || 0);
        return `<button onclick="filterIssues('${f}')" class="issue-filter-btn px-3 py-1.5 text-xs font-medium rounded-lg transition-colors ${f === 'all' ? 'bg-primary-500 text-white' : 'bg-surface-200 dark:bg-surface-700 text-surface-600 dark:text-surface-300 hover:bg-surface-300 dark:hover:bg-surface-600'}" data-filter="${f}">${f.charAt(0).toUpperCase() + f.slice(1)} <span class="ml-1 opacity-70">(${count})</span></button>`;

function filterIssues(filter) {
  const all = [...AUDIT_DATA.issues.critical, ...AUDIT_DATA.issues.high, ...AUDIT_DATA.issues.medium, ...AUDIT_DATA.issues.low];
  const filtered = filter === 'all' ? all : (AUDIT_DATA.issues[filter] || []);
  document.getElementById('issues-list').innerHTML = filtered.map(renderIssueRow).join('');
  document.querySelectorAll('.issue-filter-btn').forEach(btn => {
    const isActive = btn.dataset.filter === filter;
    btn.className = `issue-filter-btn px-3 py-1.5 text-xs font-medium rounded-lg transition-colors ${isActive ? 'bg-primary-500 text-white' : 'bg-surface-200 dark:bg-surface-700 text-surface-600 dark:text-surface-300 hover:bg-surface-300 dark:hover:bg-surface-600'}`;
  });
}

  document.querySelectorAll('.tab-btn').forEach(btn => {
    const isActive = btn.dataset.tab === tabId;
    btn.className = `tab-btn px-4 py-2.5 text-sm font-medium transition-all relative ${isActive ? 'tab-active text-primary-600 dark:text-primary-400' : 'text-surface-500 hover:text-surface-700 dark:hover:text-surface-300'}`;
  });

  const content = document.getElementById('content');
  switch(tabId) {
    case 'dashboard': content.innerHTML = renderDashboard(); initRadarChart(); initBarChart(); break;
    case 'issues': content.innerHTML = renderIssues(); break;
    case 'architecture': content.innerHTML = renderArchitecture(); initLintChart(); renderMermaid(); break;
    case 'competitor': content.innerHTML = renderCompetitor(); break;
    case 'roadmap': content.innerHTML = renderRoadmap(); break;
    case 'growth': content.innerHTML = renderGrowth(); initVelocityChart(); initCoverageChart(); break;
  }
}

function renderMermaid() {
  if (typeof mermaid === 'undefined') return;
  mermaid.initialize({ startOnLoad: false, theme: 'base', themeVariables: { primaryColor: '#5E6AD2', primaryTextColor: '#fff', primaryBorderColor: '#5E6AD2', lineColor: '#a1a1aa', secondaryColor: '#3b82f6', tertiaryColor: '#22c55e' } });
  const archDiagram = `graph TB
    subgraph Interfaces["Interfaces"]
        CLI[CLI<br/>Click] ; TUI[TUI<br/>Textual] ; WS[WebSocket<br/>FastAPI] ; SDK[SDK<br/>NexusSDK] ; WEB[Web UI<br/>Gradio]
    end
    subgraph Core["Core"]
        AGENT[Agent<br/>Role-based] ; SESSION[Session<br/>Manager] ; WORKER[Worker<br/>Pool]
    end
    subgraph Memory["Memory v2"]
        FM[FileMemory] ; HI[HybridIndex] ; DC[DreamCycle] ; DAG[SummaryDAG]
    end
    subgraph Infrastructure["Infrastructure"]
        CONFIG[Config] ; BUS[NATS Bus] ; DB[(SQLite)] ; AUTH[Auth]
    end
    CLI --> SDK ; TUI --> WS ; WEB --> SDK ; SDK --> BUS ; WS --> SESSION
    CLI --> WORKER ; SESSION --> AGENT ; WORKER --> AGENT
    AGENT --> Memory ; AGENT --> CONFIG ; BUS --> DB ; SESSION --> DB
    style Interfaces fill:#5E6AD2,color:#fff ; style Core fill:#3b82f6,color:#fff ; style Memory fill:#22c55e,color:#fff ; style Infrastructure fill:#f59e0b,color:#fff`;
  const flowDiagram = `flowchart LR
    USER([User]) -->|input| TUI[TUI/CLI] ; TUI -->|WebSocket| SERVER[FastAPI]
    TUI -->|direct| SDK[SDK] ; SDK -->|publish| NATS[NATS] ; NATS -->|subscribe| WORKER[Worker]
    WORKER -->|execute| AGENT[Agent] ; AGENT -->|call| TOOLS[Tools] ; AGENT -->|store| MEM[Memory v2]
    WORKER -->|result| NATS ; NATS -->|notify| SERVER ; SERVER -->|stream| TUI ; TUI -->|render| USER
    style USER fill:#5E6AD2,color:#fff ; style TUI fill:#8b5cf6,color:#fff ; style SERVER fill:#3b82f6,color:#fff
    style NATS fill:#ef4444,color:#fff ; style WORKER fill:#f59e0b,color:#000 ; style AGENT fill:#22c55e,color:#fff
    style MEM fill:#8b5cf6,color:#fff`;
  mermaid.render('arch-svg', archDiagram).then(({ svg }) => {
    const el = document.getElementById('arch-diagram');
    if (el) el.innerHTML = svg;
  });
  mermaid.render('flow-svg', flowDiagram).then(({ svg }) => {
    const el = document.getElementById('flow-diagram');
    if (el) el.innerHTML = svg;
  });
}

// Tab click handlers
document.querySelectorAll('.tab-btn').forEach(btn => {
  btn.addEventListener('click', () => switchTab(btn.dataset.tab));
});

// Dark mode toggle
document.getElementById('darkToggle').addEventListener('click', function() {
  document.documentElement.classList.toggle('dark');
  this.textContent = document.documentElement.classList.contains('dark') ? '☀️' : '🌙';
});

// Init
switchTab('dashboard');
</script>
</body>
</html>
